<div class="container">
  <div class="header">
    <h2>Últimos Artículos</h2>
    <div class="feed-tabs" *ngIf="currentUserId">
      <button
        mat-button
        [class.active-tab]="activeTab === 'all'"
        (click)="switchTab('all')">
        Todos
      </button>
      <button
        mat-button
        [class.active-tab]="activeTab === 'following'"
        (click)="switchTab('following')">
        Siguiendo
      </button>
    </div>
    <input
      [(ngModel)]="searchTerm"
      (input)="filterArticles()"
      placeholder="Buscar artículos..."
      class="search-input">
    <button mat-flat-button color="primary" *ngIf="currentUserId" routerLink="/articles/create">Crear Artículo</button>
  </div>

  <div *ngIf="filteredArticles.length === 0" class="empty-state">
    <h3>¡Bienvenido a tu Blog!</h3>
    <p>Aún no hay artículos publicados. ¡Sé el primero en crear uno!</p>
    <button mat-raised-button color="primary" routerLink="/articles/create">Crear mi primer artículo</button>
  </div>

  <div *ngIf="filteredArticles.length > 0" class="articles-column">
    <app-article-card
      *ngFor="let article of filteredArticles"
      [article]="article"
      [currentUserId]="currentUserId"
      (like)="likeArticle($event)"
      (dislike)="dislikeArticle($event)"
      (delete)="deleteArticle($event)">
    </app-article-card>
  </div>

  <div class="pagination" *ngIf="totalPages > 1">
    <button mat-icon-button (click)="loadPage(currentPage - 1)" [disabled]="currentPage === 1">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <span>{{ currentPage }} / {{ totalPages }}</span>
    <button mat-icon-button (click)="loadPage(currentPage + 1)" [disabled]="currentPage === totalPages">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
</div>
